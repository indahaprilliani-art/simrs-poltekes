<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRS</title>
    <link rel="stylesheet" href="index.css" />

</head>
<body>
    <header class="header-menu">
        <div>
            <h4>SIMRS</h4>
        </div>
        <div class="menu">
            <a href="/index.html">Home</a>
            <a href="/pengguna.html">Pengguna</a>
            <a class="active" href="/pendaftaran.html">Pendaftaran</a>
            <a href="/rawatjalan.html">Rawat Jalan</a>
         </div>
        <div class="button-auth">
            <button>Logout</button>
        </div>
    </header>
    <div class="container">
        <h2>Form Pendaftaran Pasien</h2>
    </div>
    <div class="form">
        <form>
            <label>Nama Pasien</label>
            <input required type="text" placeholder="Masukkan nama pasien">

            <label>No RM Pasien</label>
            <input required type="text" placeholder="Masukkan nomor rekam medis">

            <label>NIK Pasien</label>
            <input required type="text" placeholder="Masukkan NIK">

            <label>Tanggal Lahir</label>
            <input required type="date">

            <label>Tujuan Poliklinik</label>
            <select>
                <option>Pilih Poliklinik</option>
                <option>Poli Umum</option>
                <option>Poli Anak</option>
                <option>Poli Gigi</option>
            </select>

            <label>Dokter Poliklinik</label>
            <select>
                <option>Pilih Dokter</option>
                <option>Dr. Adji</option>
                <option>Dr. Eddy</option>
                <option>Dr. Vera</option>
                
            </select>

            <button type="submit">Simpan</button>
        </form>
    </div>

</body>
</html>
